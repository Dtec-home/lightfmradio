<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0a0a14; }
      .cross { fill: #c9a84c; }
      .wave { stroke: #c9a84c; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0a0a14; }
      .cross { fill: #d4af5a; }
      .wave { stroke: #d4af5a; }
    }
  </style>
  <!-- Background -->
  <rect class="bg" width="180" height="180" rx="36" fill="#0a0a14"/>

  <!-- Radio waves (left of cross) -->
  <path class="wave" d="M 55 110 Q 35 90 55 70" stroke="#d4af5a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path class="wave" d="M 45 118 Q 18 90 45 62" stroke="#d4af5a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Radio waves (right of cross) -->
  <path class="wave" d="M 125 110 Q 145 90 125 70" stroke="#d4af5a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path class="wave" d="M 135 118 Q 162 90 135 62" stroke="#d4af5a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Cross: vertical beam -->
  <rect class="cross" x="84" y="38" width="12" height="104" rx="4" fill="#d4af5a"/>
  <!-- Cross: horizontal beam -->
  <rect class="cross" x="56" y="68" width="68" height="12" rx="4" fill="#d4af5a"/>
</svg>